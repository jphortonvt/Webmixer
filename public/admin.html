<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[Insert Band Name Here] - Admin</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎚</text></svg>">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .admin-container {
      max-width: 600px;
      margin: 40px auto;
      padding: 0 24px;
    }
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .admin-header h2 { color: var(--accent); }
    .back-link {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.9rem;
    }
    .back-link:hover { color: var(--accent); }
    .invite-form {
      display: flex;
      gap: 8px;
      margin-bottom: 32px;
    }
    .invite-form input {
      flex: 1;
      background: var(--bg-surface);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 0.9rem;
    }
    .invite-form input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .invite-form button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 10px 20px;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .invite-form button:hover { opacity: 0.9; }
    .msg {
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 0.85rem;
    }
    .msg.success { background: rgba(100,200,100,0.15); color: #8c8; border: 1px solid #4a6; }
    .msg.error { background: rgba(233,69,96,0.15); color: var(--accent); border: 1px solid var(--accent); }
    .msg.hidden { display: none; }
    .user-list { list-style: none; }
    .user-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg-strip);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 16px;
      margin-bottom: 8px;
    }
    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--bg-surface);
    }
    .user-email { font-size: 0.9rem; }
    .user-name { font-size: 0.75rem; color: var(--text-secondary); }
    .user-status {
      font-size: 0.7rem;
      padding: 3px 8px;
      border-radius: 4px;
      margin-left: 8px;
    }
    .status-admin { background: var(--accent); color: #fff; }
    .status-active { background: #4a6; color: #fff; }
    .status-pending { background: var(--bg-surface); color: var(--text-secondary); }
    .btn-remove {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 0.75rem;
      cursor: pointer;
    }
    .btn-remove:hover { border-color: var(--accent); color: var(--accent); }

    /* Upload section */
    .section-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 32px 0;
    }
    .upload-area {
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 32px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 16px;
    }
    .upload-area:hover, .upload-area.dragover {
      border-color: var(--accent);
      background: rgba(233, 69, 96, 0.05);
    }
    .upload-area p {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 8px;
    }
    .upload-area .upload-hint {
      font-size: 0.75rem;
      color: var(--text-secondary);
      opacity: 0.7;
    }
    .upload-file-input { display: none; }
    .upload-progress {
      margin-top: 16px;
    }
    .upload-progress.hidden { display: none; }
    .progress-bar-container {
      background: var(--bg-surface);
      border-radius: 4px;
      height: 8px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .progress-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 4px;
      transition: width 0.3s;
      width: 0%;
    }
    .progress-text {
      font-size: 0.8rem;
      color: var(--text-secondary);
      text-align: center;
    }
    .upload-results {
      font-size: 0.85rem;
      margin-top: 12px;
    }
    .upload-results.hidden { display: none; }
  </style>
</head>
<body>
  <header>
    <h1>[Insert Band Name Here]</h1>
  </header>
  <div class="admin-container">
    <div class="admin-header">
      <h2>Manage Members</h2>
      <a href="/" class="back-link">Back to Mixer</a>
    </div>

    <div class="invite-form">
      <input type="email" id="invite-email" placeholder="Enter email to invite...">
      <button id="btn-invite">Invite</button>
    </div>

    <div id="msg" class="msg hidden"></div>

    <ul class="user-list" id="user-list"></ul>

    <hr class="section-divider">

    <div class="admin-header">
      <h2>Upload Sessions</h2>
    </div>

    <div class="upload-area" id="upload-area">
      <p>Click to select session folders or drag &amp; drop</p>
      <p class="upload-hint">Select one or more folders containing WAV files (e.g., 251213_000100/TRACK01.WAV)</p>
      <input type="file" class="upload-file-input" id="upload-input" webkitdirectory multiple>
    </div>

    <div id="upload-file-list"></div>

    <div class="upload-progress hidden" id="upload-progress">
      <div class="progress-bar-container">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div class="progress-text" id="progress-text">Uploading...</div>
    </div>

    <div class="upload-results hidden" id="upload-results"></div>
  </div>

  <script>
    const userList = document.getElementById('user-list');
    const inviteEmail = document.getElementById('invite-email');
    const btnInvite = document.getElementById('btn-invite');
    const msgEl = document.getElementById('msg');

    function showMsg(text, type) {
      msgEl.textContent = text;
      msgEl.className = 'msg ' + type;
      setTimeout(() => { msgEl.className = 'msg hidden'; }, 4000);
    }

    async function loadUsers() {
      const res = await fetch('/api/admin/users');
      if (res.status === 403) {
        document.querySelector('.admin-container').innerHTML = '<p style="text-align:center;color:var(--accent);margin-top:60px;">Admin access required.</p>';
        return;
      }
      const users = await res.json();
      userList.innerHTML = '';
      users.forEach(u => {
        const li = document.createElement('li');
        li.className = 'user-item';

        let status;
        if (u.is_admin) status = '<span class="user-status status-admin">Admin</span>';
        else if (u.last_login) status = '<span class="user-status status-active">Active</span>';
        else status = '<span class="user-status status-pending">Pending</span>';

        const avatar = u.picture
          ? '<img class="user-avatar" src="' + u.picture + '" referrerpolicy="no-referrer">'
          : '<div class="user-avatar"></div>';

        li.innerHTML = `
          <div class="user-info">
            ${avatar}
            <div>
              <div class="user-email">${u.email} ${status}</div>
              <div class="user-name">${u.name || 'Not yet signed in'}</div>
            </div>
          </div>
          ${u.is_admin ? '' : '<button class="btn-remove" data-id="' + u.id + '">Remove</button>'}
        `;
        userList.appendChild(li);
      });

      userList.querySelectorAll('.btn-remove').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!confirm('Remove this user? Their comments will also be deleted.')) return;
          const res = await fetch('/api/admin/users/' + btn.dataset.id, { method: 'DELETE' });
          if (res.ok) {
            showMsg('User removed.', 'success');
            loadUsers();
          } else {
            const data = await res.json();
            showMsg(data.error || 'Failed to remove user.', 'error');
          }
        });
      });
    }

    btnInvite.addEventListener('click', async () => {
      const email = inviteEmail.value.trim();
      if (!email) return;
      const res = await fetch('/api/admin/invite', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      const data = await res.json();
      if (res.ok) {
        showMsg('Invited ' + email, 'success');
        inviteEmail.value = '';
        loadUsers();
      } else {
        showMsg(data.error || 'Failed to invite.', 'error');
      }
    });

    inviteEmail.addEventListener('keydown', e => {
      if (e.key === 'Enter') btnInvite.click();
    });

    loadUsers();

    // --- Upload functionality ---
    const uploadArea = document.getElementById('upload-area');
    const uploadInput = document.getElementById('upload-input');
    const uploadProgress = document.getElementById('upload-progress');
    const progressBar = document.getElementById('progress-bar');
    const progressText = document.getElementById('progress-text');
    const uploadResults = document.getElementById('upload-results');
    const uploadFileList = document.getElementById('upload-file-list');

    uploadArea.addEventListener('click', () => uploadInput.click());

    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      // Drop doesn't work well with directories in most browsers,
      // so just trigger the file picker
      uploadInput.click();
    });

    uploadInput.addEventListener('change', async () => {
      const files = Array.from(uploadInput.files);
      if (files.length === 0) return;

      // Filter to WAV files only
      const wavFiles = files.filter(f => /\.wav$/i.test(f.name));

      if (wavFiles.length === 0) {
        showMsg('No WAV files found in the selected folder(s).', 'error');
        return;
      }

      // Show what will be uploaded
      const folderMap = {};
      for (const f of wavFiles) {
        const path = f.webkitRelativePath || f.name;
        const parts = path.split('/');
        // Find session folder
        let folder = 'Unknown';
        for (const p of parts) {
          if (/^\d{6}_\d{6}$/.test(p)) { folder = p; break; }
        }
        if (!folderMap[folder]) folderMap[folder] = [];
        folderMap[folder].push(f);
      }

      const folderNames = Object.keys(folderMap);
      const totalSize = wavFiles.reduce((sum, f) => sum + f.size, 0);
      const sizeMB = (totalSize / 1024 / 1024).toFixed(0);

      if (!confirm(`Upload ${wavFiles.length} WAV files from ${folderNames.length} session(s)? (${sizeMB} MB total)\n\nSessions:\n${folderNames.join('\n')}`)) {
        uploadInput.value = '';
        return;
      }

      // Upload files one at a time to avoid memory issues
      uploadProgress.classList.remove('hidden');
      uploadResults.classList.add('hidden');
      let uploaded = 0;
      let failed = 0;

      for (let i = 0; i < wavFiles.length; i++) {
        const file = wavFiles[i];
        const percent = Math.round((i / wavFiles.length) * 100);
        progressBar.style.width = percent + '%';
        progressText.textContent = `Uploading ${i + 1}/${wavFiles.length}: ${file.webkitRelativePath || file.name}`;

        const formData = new FormData();
        formData.append('files', file, file.webkitRelativePath || file.name);

        try {
          const res = await fetch('/api/admin/upload', {
            method: 'POST',
            body: formData,
          });
          const data = await res.json();
          if (res.ok && data.uploaded > 0) {
            uploaded++;
          } else {
            failed++;
          }
        } catch (err) {
          console.error('Upload failed:', err);
          failed++;
        }
      }

      progressBar.style.width = '100%';
      progressText.textContent = 'Upload complete!';

      uploadResults.classList.remove('hidden');
      uploadResults.innerHTML = `
        <div class="msg success">
          Uploaded ${uploaded} file(s) to ${folderNames.length} session(s).
          ${failed > 0 ? `<br>${failed} file(s) failed.` : ''}
        </div>
      `;

      uploadInput.value = '';

      // Hide progress after a moment
      setTimeout(() => {
        uploadProgress.classList.add('hidden');
      }, 2000);
    });
  </script>
</body>
</html>
