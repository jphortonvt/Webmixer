<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[Insert Band Name Here] - Admin</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎚</text></svg>">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .admin-container {
      max-width: 600px;
      margin: 40px auto;
      padding: 0 24px;
    }
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .admin-header h2 { color: var(--accent); }
    .back-link {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.9rem;
    }
    .back-link:hover { color: var(--accent); }
    .invite-form {
      display: flex;
      gap: 8px;
      margin-bottom: 32px;
    }
    .invite-form input {
      flex: 1;
      background: var(--bg-surface);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 0.9rem;
    }
    .invite-form input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .invite-form button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 10px 20px;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .invite-form button:hover { opacity: 0.9; }
    .msg {
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 0.85rem;
    }
    .msg.success { background: rgba(100,200,100,0.15); color: #8c8; border: 1px solid #4a6; }
    .msg.error { background: rgba(233,69,96,0.15); color: var(--accent); border: 1px solid var(--accent); }
    .msg.hidden { display: none; }
    .user-list { list-style: none; }
    .user-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg-strip);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 16px;
      margin-bottom: 8px;
    }
    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--bg-surface);
    }
    .user-email { font-size: 0.9rem; }
    .user-name { font-size: 0.75rem; color: var(--text-secondary); }
    .user-status {
      font-size: 0.7rem;
      padding: 3px 8px;
      border-radius: 4px;
      margin-left: 8px;
    }
    .status-admin { background: var(--accent); color: #fff; }
    .status-active { background: #4a6; color: #fff; }
    .status-pending { background: var(--bg-surface); color: var(--text-secondary); }
    .btn-remove {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 0.75rem;
      cursor: pointer;
    }
    .btn-remove:hover { border-color: var(--accent); color: var(--accent); }

    /* Upload section */
    .section-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 32px 0;
    }
    .upload-area {
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 32px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 16px;
    }
    .upload-area:hover, .upload-area.dragover {
      border-color: var(--accent);
      background: rgba(233, 69, 96, 0.05);
    }
    .upload-area p {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 8px;
    }
    .upload-area .upload-hint {
      font-size: 0.75rem;
      color: var(--text-secondary);
      opacity: 0.7;
    }
    .upload-file-input { display: none; }
    .upload-progress {
      margin-top: 16px;
    }
    .upload-progress.hidden { display: none; }
    .progress-bar-container {
      background: var(--bg-surface);
      border-radius: 4px;
      height: 8px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .progress-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 4px;
      transition: width 0.3s;
      width: 0%;
    }
    .progress-text {
      font-size: 0.8rem;
      color: var(--text-secondary);
      text-align: center;
    }
    .upload-results {
      font-size: 0.85rem;
      margin-top: 12px;
    }
    .upload-results.hidden { display: none; }

    /* Upload queue */
    .upload-queue { margin-bottom: 16px; }
    .upload-queue.hidden { display: none; }
    .queue-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg-strip);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 14px;
      margin-bottom: 6px;
      font-size: 0.85rem;
    }
    .queue-item-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .queue-folder { font-weight: 600; color: var(--text-primary); }
    .queue-count { font-size: 0.75rem; color: var(--text-secondary); }
    .queue-size { font-size: 0.75rem; color: var(--text-secondary); }
    .btn-queue-remove {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 0.7rem;
      cursor: pointer;
    }
    .btn-queue-remove:hover { border-color: var(--accent); color: var(--accent); }
    .btn-upload-all {
      flex: 1;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 10px 20px;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .btn-upload-all:hover { opacity: 0.9; }
    .btn-upload-all.hidden { display: none; }
    .btn-clear-queue {
      background: var(--bg-surface);
      color: var(--text-secondary);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 16px;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .btn-clear-queue:hover { border-color: var(--text-secondary); }
    .btn-clear-queue.hidden { display: none; }
  </style>
</head>
<body>
  <header>
    <h1>[Insert Band Name Here]</h1>
  </header>
  <div class="admin-container">
    <div class="admin-header">
      <h2>Manage Members</h2>
      <a href="/" class="back-link">Back to Mixer</a>
    </div>

    <div class="invite-form">
      <input type="email" id="invite-email" placeholder="Enter email to invite...">
      <button id="btn-invite">Invite</button>
    </div>

    <div id="msg" class="msg hidden"></div>

    <ul class="user-list" id="user-list"></ul>

    <hr class="section-divider">

    <div class="admin-header">
      <h2>Upload Sessions</h2>
    </div>

    <div class="upload-area" id="upload-area">
      <p>Click to add a session folder</p>
      <p class="upload-hint">Select folders containing WAV files (e.g., 251213_000100/TRACK01.WAV)</p>
      <input type="file" class="upload-file-input" id="upload-input" webkitdirectory multiple>
    </div>

    <div id="upload-queue" class="upload-queue hidden"></div>

    <div style="display: flex; gap: 8px; margin-bottom: 16px;">
      <button id="btn-upload-all" class="btn-upload-all hidden">Upload All</button>
      <button id="btn-clear-queue" class="btn-clear-queue hidden">Clear Queue</button>
    </div>

    <div class="upload-progress hidden" id="upload-progress">
      <div class="progress-bar-container">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div class="progress-text" id="progress-text">Uploading...</div>
    </div>

    <div class="upload-results hidden" id="upload-results"></div>
  </div>

  <script>
    const userList = document.getElementById('user-list');
    const inviteEmail = document.getElementById('invite-email');
    const btnInvite = document.getElementById('btn-invite');
    const msgEl = document.getElementById('msg');

    function showMsg(text, type) {
      msgEl.textContent = text;
      msgEl.className = 'msg ' + type;
      setTimeout(() => { msgEl.className = 'msg hidden'; }, 4000);
    }

    async function loadUsers() {
      const res = await fetch('/api/admin/users');
      if (res.status === 403) {
        document.querySelector('.admin-container').innerHTML = '<p style="text-align:center;color:var(--accent);margin-top:60px;">Admin access required.</p>';
        return;
      }
      const users = await res.json();
      userList.innerHTML = '';
      users.forEach(u => {
        const li = document.createElement('li');
        li.className = 'user-item';

        let status;
        if (u.is_admin) status = '<span class="user-status status-admin">Admin</span>';
        else if (u.last_login) status = '<span class="user-status status-active">Active</span>';
        else status = '<span class="user-status status-pending">Pending</span>';

        const avatar = u.picture
          ? '<img class="user-avatar" src="' + u.picture + '" referrerpolicy="no-referrer">'
          : '<div class="user-avatar"></div>';

        li.innerHTML = `
          <div class="user-info">
            ${avatar}
            <div>
              <div class="user-email">${u.email} ${status}</div>
              <div class="user-name">${u.name || 'Not yet signed in'}</div>
            </div>
          </div>
          ${u.is_admin ? '' : '<button class="btn-remove" data-id="' + u.id + '">Remove</button>'}
        `;
        userList.appendChild(li);
      });

      userList.querySelectorAll('.btn-remove').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!confirm('Remove this user? Their comments will also be deleted.')) return;
          const res = await fetch('/api/admin/users/' + btn.dataset.id, { method: 'DELETE' });
          if (res.ok) {
            showMsg('User removed.', 'success');
            loadUsers();
          } else {
            const data = await res.json();
            showMsg(data.error || 'Failed to remove user.', 'error');
          }
        });
      });
    }

    btnInvite.addEventListener('click', async () => {
      const email = inviteEmail.value.trim();
      if (!email) return;
      const res = await fetch('/api/admin/invite', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      const data = await res.json();
      if (res.ok) {
        showMsg('Invited ' + email, 'success');
        inviteEmail.value = '';
        loadUsers();
      } else {
        showMsg(data.error || 'Failed to invite.', 'error');
      }
    });

    inviteEmail.addEventListener('keydown', e => {
      if (e.key === 'Enter') btnInvite.click();
    });

    loadUsers();

    // --- Upload functionality (queue-based) ---
    const uploadArea = document.getElementById('upload-area');
    const uploadInput = document.getElementById('upload-input');
    const uploadProgress = document.getElementById('upload-progress');
    const progressBar = document.getElementById('progress-bar');
    const progressText = document.getElementById('progress-text');
    const uploadResults = document.getElementById('upload-results');
    const uploadQueue = document.getElementById('upload-queue');
    const btnUploadAll = document.getElementById('btn-upload-all');
    const btnClearQueue = document.getElementById('btn-clear-queue');

    // Queue: array of { folder, files: [File, ...], totalSize }
    let fileQueue = [];

    uploadArea.addEventListener('click', () => uploadInput.click());

    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      uploadInput.click();
    });

    uploadInput.addEventListener('change', () => {
      const files = Array.from(uploadInput.files);
      if (files.length === 0) return;

      // Filter to WAV files only
      const wavFiles = files.filter(f => /\.wav$/i.test(f.name));

      if (wavFiles.length === 0) {
        showMsg('No WAV files found in the selected folder.', 'error');
        uploadInput.value = '';
        return;
      }

      // Group by session folder
      const folderMap = {};
      for (const f of wavFiles) {
        const filePath = f.webkitRelativePath || f.name;
        const parts = filePath.split('/');
        let folder = 'Unknown';
        for (const p of parts) {
          if (/^\d{6}_\d{6}$/.test(p)) { folder = p; break; }
        }
        if (!folderMap[folder]) folderMap[folder] = [];
        folderMap[folder].push(f);
      }

      // Add each folder to the queue (skip duplicates)
      let added = 0;
      for (const [folder, files] of Object.entries(folderMap)) {
        // Check if this folder is already queued
        if (fileQueue.some(q => q.folder === folder)) {
          showMsg(`"${folder}" is already in the queue.`, 'error');
          continue;
        }
        const totalSize = files.reduce((sum, f) => sum + f.size, 0);
        fileQueue.push({ folder, files, totalSize });
        added++;
      }

      if (added > 0) {
        showMsg(`Added ${added} folder(s) to upload queue.`, 'success');
      }

      uploadInput.value = '';
      renderQueue();
    });

    function renderQueue() {
      if (fileQueue.length === 0) {
        uploadQueue.classList.add('hidden');
        btnUploadAll.classList.add('hidden');
        btnClearQueue.classList.add('hidden');
        uploadQueue.innerHTML = '';
        return;
      }

      uploadQueue.classList.remove('hidden');
      btnUploadAll.classList.remove('hidden');
      btnClearQueue.classList.remove('hidden');

      uploadQueue.innerHTML = fileQueue.map((q, idx) => {
        const sizeMB = (q.totalSize / 1024 / 1024).toFixed(0);
        return `
          <div class="queue-item">
            <div class="queue-item-info">
              <span class="queue-folder">${q.folder}</span>
              <span class="queue-count">${q.files.length} WAV files</span>
              <span class="queue-size">${sizeMB} MB</span>
            </div>
            <button class="btn-queue-remove" data-idx="${idx}">Remove</button>
          </div>
        `;
      }).join('');

      // Wire up remove buttons
      uploadQueue.querySelectorAll('.btn-queue-remove').forEach(btn => {
        btn.addEventListener('click', () => {
          fileQueue.splice(parseInt(btn.dataset.idx), 1);
          renderQueue();
        });
      });
    }

    btnClearQueue.addEventListener('click', () => {
      fileQueue = [];
      renderQueue();
    });

    btnUploadAll.addEventListener('click', async () => {
      if (fileQueue.length === 0) return;

      const allFiles = fileQueue.flatMap(q => q.files);
      const totalSize = fileQueue.reduce((sum, q) => sum + q.totalSize, 0);
      const sizeMB = (totalSize / 1024 / 1024).toFixed(0);
      const folderNames = fileQueue.map(q => q.folder);

      if (!confirm(`Upload ${allFiles.length} WAV files from ${folderNames.length} session(s)? (${sizeMB} MB total)\n\nSessions:\n${folderNames.join('\n')}`)) {
        return;
      }

      // Disable buttons during upload
      btnUploadAll.disabled = true;
      btnClearQueue.disabled = true;
      uploadArea.style.pointerEvents = 'none';
      uploadArea.style.opacity = '0.5';

      uploadProgress.classList.remove('hidden');
      uploadResults.classList.add('hidden');
      let uploaded = 0;
      let failed = 0;

      for (let i = 0; i < allFiles.length; i++) {
        const file = allFiles[i];
        const percent = Math.round((i / allFiles.length) * 100);
        progressBar.style.width = percent + '%';
        progressText.textContent = `Uploading ${i + 1}/${allFiles.length}: ${file.webkitRelativePath || file.name}`;

        const formData = new FormData();
        formData.append('files', file, file.webkitRelativePath || file.name);

        try {
          const res = await fetch('/api/admin/upload', {
            method: 'POST',
            body: formData,
          });
          const data = await res.json();
          if (res.ok && data.uploaded > 0) {
            uploaded++;
          } else {
            failed++;
          }
        } catch (err) {
          console.error('Upload failed:', err);
          failed++;
        }
      }

      progressBar.style.width = '100%';
      progressText.textContent = 'Upload complete!';

      uploadResults.classList.remove('hidden');
      uploadResults.innerHTML = `
        <div class="msg success">
          Uploaded ${uploaded} file(s) to ${folderNames.length} session(s).
          ${failed > 0 ? `<br>${failed} file(s) failed.` : ''}
        </div>
      `;

      // Clear queue
      fileQueue = [];
      renderQueue();

      // Re-enable controls
      btnUploadAll.disabled = false;
      btnClearQueue.disabled = false;
      uploadArea.style.pointerEvents = '';
      uploadArea.style.opacity = '';

      // Hide progress after a moment
      setTimeout(() => {
        uploadProgress.classList.add('hidden');
      }, 2000);
    });
  </script>
</body>
</html>
