<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[Insert Band Name Here] - Sign In</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎚</text></svg>">
  <style>
    :root {
      --bg-primary: #121218;
      --bg-secondary: #1a1a2e;
      --bg-surface: #222240;
      --text-primary: #e0e0e0;
      --text-secondary: #8888aa;
      --accent: #e94560;
      --border: #2a2a4a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .login-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 48px 40px;
      text-align: center;
      max-width: 400px;
      width: 90%;
    }
    h1 {
      color: var(--accent);
      font-size: 1.6rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .subtitle {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 32px;
    }
    .google-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: #fff;
      color: #333;
      border: none;
      border-radius: 6px;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: box-shadow 0.2s;
    }
    .google-btn:hover {
      box-shadow: 0 2px 12px rgba(233, 69, 96, 0.3);
    }
    .google-btn svg {
      width: 20px;
      height: 20px;
    }
    .error-msg {
      background: rgba(233, 69, 96, 0.15);
      border: 1px solid var(--accent);
      color: var(--accent);
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 24px;
      font-size: 0.9rem;
    }
    .error-msg.hidden { display: none; }
    .dev-notice {
      margin-top: 24px;
      padding: 12px;
      background: rgba(100, 200, 100, 0.1);
      border: 1px solid #4a6;
      border-radius: 6px;
      color: #8c8;
      font-size: 0.8rem;
    }
    .dev-notice.hidden { display: none; }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>[Insert Band Name Here]</h1>
    <p class="subtitle">Band Mixer &amp; Collaboration</p>

    <div id="error-msg" class="error-msg hidden"></div>

    <a href="/auth/google" class="google-btn">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Sign in with Google
    </a>

    <div id="dev-notice" class="dev-notice hidden">
      Dev mode active — Google OAuth not configured.<br>
      Auto-signing in as admin.
    </div>
  </div>

  <script>
    // Check for error in URL
    const params = new URLSearchParams(window.location.search);
    if (params.get('error') === 'denied') {
      const el = document.getElementById('error-msg');
      el.textContent = 'Access denied. You have not been invited. Contact the admin for access.';
      el.classList.remove('hidden');
    }

    // Check if already authenticated or in dev mode
    fetch('/auth/me')
      .then(r => r.json())
      .then(data => {
        if (data.id) {
          window.location.href = '/';
        }
        if (data.devMode) {
          document.getElementById('dev-notice').classList.remove('hidden');
        }
      })
      .catch(() => {});
  </script>
</body>
</html>
